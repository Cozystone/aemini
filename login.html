<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>에미나이 — 신원 확인</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap');
    @font-face { font-family:'WK붓글'; src:url('fonts/nkfonts/WKBusgul.ttf') format('truetype'); }
    @font-face { font-family:'WK궁체'; src:url('fonts/nkfonts/WKGungche.ttf') format('truetype'); }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D0005;
      color: #F0E8D8;
      font-family: 'WK궁체','Noto Serif KR','궁서체',serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* 상단 선전 띠 */
    .top-banner {
      background: #C8102E;
      color: #fff;
      text-align: center;
      padding: 6px;
      font-size: 12px;
      letter-spacing: 2px;
      border-bottom: 3px solid #8E0018;
    }

    /* 국기 줄무늬 */
    .flag-stripe {
      display: flex;
      height: 8px;
    }
    .flag-stripe span:nth-child(1) { background:#00398E; flex:1; }
    .flag-stripe span:nth-child(2) { background:#fff; flex:0 0 2px; }
    .flag-stripe span:nth-child(3) { background:#C8102E; flex:3; }
    .flag-stripe span:nth-child(4) { background:#fff; flex:0 0 2px; }
    .flag-stripe span:nth-child(5) { background:#00398E; flex:1; }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 16px;
    }

    .card {
      width: 100%;
      max-width: 420px;
      border: 2px solid #C8102E;
      border-top: 6px solid #C8102E;
      background: #140008;
      box-shadow: 6px 6px 0 #8E0018;
    }

    .card-header {
      background: #C8102E;
      padding: 20px 24px 16px;
      text-align: center;
      border-bottom: 3px solid #8E0018;
    }
    .card-logo {
      font-family: 'WK붓글','WK궁체','궁서체',serif;
      font-size: 32px;
      color: #fff;
      letter-spacing: 6px;
      text-shadow: 2px 2px 0 #8E0018;
    }
    .card-logo span { font-size: 24px; margin-right: 8px; }
    .card-subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      letter-spacing: 3px;
      margin-top: 4px;
    }

    .flag-stripe-sm {
      display: flex;
      height: 5px;
    }
    .flag-stripe-sm span:nth-child(1) { background:#00398E; flex:1; }
    .flag-stripe-sm span:nth-child(2) { background:#fff; flex:0 0 2px; }
    .flag-stripe-sm span:nth-child(3) { background:#C8102E; flex:3; }
    .flag-stripe-sm span:nth-child(4) { background:#fff; flex:0 0 2px; }
    .flag-stripe-sm span:nth-child(5) { background:#00398E; flex:1; }

    .card-body { padding: 28px 24px; }

    .notice {
      background: rgba(200,16,46,0.12);
      border: 1px solid rgba(200,16,46,0.4);
      border-left: 4px solid #C8102E;
      padding: 10px 14px;
      font-size: 12px;
      color: #E8A0A0;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .notice strong { color: #FF6666; }

    .form-group { margin-bottom: 18px; }
    .form-label {
      display: block;
      font-size: 11px;
      color: #C8A080;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%;
      padding: 11px 14px;
      background: #0A0004;
      border: 2px solid #4A1020;
      color: #F0E8D8;
      font-family: inherit;
      font-size: 15px;
      outline: none;
      transition: border-color .15s;
    }
    .form-input:focus { border-color: #C8102E; }
    .form-input::placeholder { color: #5A3040; }

    .submit-btn {
      width: 100%;
      padding: 13px;
      background: #C8102E;
      border: none;
      border-bottom: 4px solid #8E0018;
      color: #fff;
      font-family: 'WK붓글','WK궁체','궁서체',serif;
      font-size: 16px;
      letter-spacing: 4px;
      cursor: pointer;
      margin-top: 8px;
      transition: background .15s;
    }
    .submit-btn:hover { background: #E52035; }
    .submit-btn:active { border-bottom-width: 1px; transform: translateY(3px); }

    .error-msg {
      background: rgba(200,16,46,0.2);
      border: 1px solid #C8102E;
      color: #FF8888;
      padding: 10px 14px;
      font-size: 13px;
      margin-top: 14px;
      display: none;
    }

    .card-footer {
      border-top: 1px solid #2A0010;
      padding: 16px 24px;
      text-align: center;
      font-size: 12px;
      color: #7A5060;
    }
    .card-footer a {
      color: #C8102E;
      text-decoration: none;
      font-weight: bold;
    }
    .card-footer a:hover { text-decoration: underline; }

    .stamp {
      text-align: center;
      padding: 16px;
      font-size: 10px;
      color: #3A1020;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

<div class="top-banner">☆ 조선민주주의인민공화국 에미나이 인민 인증 시스템 ☆</div>
<div class="flag-stripe"><span></span><span></span><span></span><span></span><span></span></div>

<div class="page">
  <div class="card">
    <div class="card-header">
      <div class="card-logo"><span>★</span>에미나이</div>
      <div class="card-subtitle">신원 확인 / 동무 인증</div>
    </div>
    <div class="flag-stripe-sm"><span></span><span></span><span></span><span></span><span></span></div>

    <div class="card-body">
      <div class="notice">
        <strong>【경고】</strong> 본 시스템은 조선민주주의인민공화국 국가보위성의 감시 하에 운영되오.<br>
        허가받지 않은 접근 시도는 즉각 보고되오.
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">동무 아이디</label>
          <input type="text" id="username" class="form-input" placeholder="아이디를 입력하시오" autocomplete="username" required/>
        </div>
        <div class="form-group">
          <label class="form-label">비밀 암호</label>
          <input type="password" id="password" class="form-input" placeholder="비밀번호를 입력하시오" autocomplete="current-password" required/>
        </div>
        <button type="submit" class="submit-btn" id="submitBtn">신원 확인</button>
        <div class="error-msg" id="errorMsg"></div>
      </form>
    </div>

    <div class="card-footer">
      아직 등록되지 않은 동무이오? <a href="signup.html">인민 등록</a>
    </div>
  </div>
</div>

<div class="stamp">국가보위성 승인필 · 에미나이 인민 인증 시스템 v1.0</div>

<script>
  // 이미 로그인 상태면 메인으로
  if (localStorage.getItem('aemini_token')) {
    window.location.href = '/';
  }

  async function handleLogin(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const errEl = document.getElementById('errorMsg');
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;

    btn.textContent = '확인 중...';
    btn.disabled = true;
    errEl.style.display = 'none';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      localStorage.setItem('aemini_token', data.token);
      localStorage.setItem('aemini_username', data.username);
      window.location.href = '/';
    } catch (err) {
      errEl.textContent = err.message;
      errEl.style.display = 'block';
      btn.textContent = '신원 확인';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
