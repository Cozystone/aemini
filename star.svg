<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40">
  <defs>
    <radialGradient id="sg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF3344"/>
      <stop offset="100%" stop-color="#8B0000"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- 5점 별 -->
  <polygon
    points="20,3 24.5,15.5 38,15.5 27,23.5 31,36 20,28.5 9,36 13,23.5 2,15.5 15.5,15.5"
    fill="url(#sg)"
    filter="url(#glow)"
  />
  <!-- 내부 강조 -->
  <polygon
    points="20,8 23,16.5 32,16.5 25,21.5 27.5,30 20,25 12.5,30 15,21.5 8,16.5 17,16.5"
    fill="rgba(255,200,200,0.2)"
  />
</svg>
